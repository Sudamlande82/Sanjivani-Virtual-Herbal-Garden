<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Plant Identifier</title>

    <style>
        :root {
            --bg: #ecf9f1;
            --card: #ffffff;
            --accent: #1f7a3a;
            --accent-light: #2aa06c;
            --muted: #6b7280;
            --shadow: 0 6px 20px rgba(0,0,0,0.10);
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            margin: 0;
            background: var(--bg);
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: var(--accent);
        }

        .subtitle {
            text-align: center;
            color: var(--muted);
        }

        .upload-box {
            background: var(--card);
            padding: 24px;
            border-radius: 18px;
            box-shadow: var(--shadow);
            margin-top: 22px;
            text-align: center;
        }

        input[type="file"] {
            margin-top: 14px;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 16px;
            padding: 12px 22px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }

            button:hover {
                background: var(--accent-light);
            }

        /* loader */
        .loader {
            text-align: center;
            display: none;
            margin-top: 20px;
        }

        /* result */
        .result-card {
            display: none;
            background: var(--card);
            padding: 20px;
            border-radius: 18px;
            box-shadow: var(--shadow);
            margin-top: 28px;
        }

            .result-card img {
                width: 100%;
                max-height: 300px;
                object-fit: cover;
                border-radius: 14px;
            }

        .result-title {
            color: var(--accent);
            font-size: 22px;
        }

        .result-tag {
            color: var(--muted);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🌿 AI Plant Identifier</h1>
        <p class="subtitle">Upload plant image to identify herbs using AI</p>

        <div class="upload-box">
            <input type="file" id="imageInput" accept="image/*">
            <br>
            <button onclick="identifyPlant()">Identify Plant</button>
        </div>

        <div id="loader" class="loader">
            <p>Analyzing image... 🌱</p>
        </div>

        <div id="resultCard" class="result-card">
            <img id="previewImage">
            <h2 id="plantTitle" class="result-title"></h2>
            <p id="plantTag" class="result-tag"></p>
            <p id="plantFamily"></p>

            <h3>Top Matches:</h3>
            <ul id="topResults"></ul>
        </div>
    </div>

    <script>
        async function identifyPlant() {
            const fileInput = document.getElementById("imageInput");

            if (!fileInput.files.length) {
                alert("Upload image first");
                return;
            }

            const formData = new FormData();
            formData.append("images", fileInput.files[0]);
            formData.append("organs", "leaf");

            try {
                const response = await fetch(
                    "https://my-api.plantnet.org/v2/identify/all?api-key=2b10geuQN31AyNRn0GPDck0B&lang=en",
                    {
                        method: "POST",
                        body: formData
                    }
                );

                const data = await response.json();
                console.log(data);

                if (data.results && data.results.length > 0) {

                    const best = data.results[0];

                    document.getElementById("plantTitle").innerText =
                        best.species?.scientificNameWithoutAuthor || "Unknown Plant";

                    document.getElementById("plantTag").innerText =
                        "Confidence: " + (best.score * 100).toFixed(2) + "%";

                    document.getElementById("plantFamily").innerText =
                        "Family: " + (best.species?.family?.scientificName || "N/A");

                    // Show top 3
                    const list = document.getElementById("topResults");
                    list.innerHTML = "";

                    data.results.slice(0, 3).forEach(item => {
                        const li = document.createElement("li");
                        li.innerText =
                            item.species.scientificNameWithoutAuthor +
                            " (" + (item.score * 100).toFixed(1) + "%)";
                        list.appendChild(li);
                    });

                } else {
                    document.getElementById("plantTitle").innerText = "Plant not identified";
                    document.getElementById("plantTag").innerText = "Try a clearer leaf image";
                }

            } catch (err) {
                console.error(err);
                alert("API error");
            }
        }
    </script>

</body>
</html>
