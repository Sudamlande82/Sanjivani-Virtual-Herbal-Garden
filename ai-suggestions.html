<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Herbal Suggestions - Virtual Herbal Garden</title>

<style>
:root{
  --bg:#f4faf4;
  --card:#ffffff;
  --accent:#1f7a3a;
  --accent-light:#2aa06c;
  --muted:#6b7280;
  --shadow:0 4px 14px rgba(0,0,0,0.10);
  font-family:Arial, Helvetica, sans-serif;
}

body{
  margin:0;
  background:var(--bg);
}

.container{
  max-width:1100px;
  margin:auto;
  padding:25px;
}

h2{
  font-size:32px;
  margin-bottom:5px;
  color:#1f2d1c;
}

.subtitle{
  color:var(--muted);
  margin-bottom:20px;
}

/* Query Box */
.query-box{
  background:var(--card);
  padding:20px;
  border-radius:14px;
  box-shadow:var(--shadow);
  margin-bottom:25px;
}

label{
  font-weight:bold;
}

textarea{
  width:100%;
  padding:14px;
  min-height:120px;
  border-radius:12px;
  border:1px solid #ccc;
  outline:none;
  font-size:15px;
}

button{
  margin-top:12px;
  padding:12px 20px;
  background:var(--accent);
  color:white;
  font-size:16px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:var(--accent-light);
}

/* Suggestion Cards */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(250px,1fr));
  gap:20px;
  margin-top:15px;
}

.card{
  background:var(--card);
  padding:15px;
  border-radius:14px;
  box-shadow:var(--shadow);
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

.card h4{
  margin:10px 0 4px;
  font-size:18px;
}

.card p{
  font-size:14px;
  color:var(--muted);
}

.tag{
  display:inline-block;
  background:#e8f7ee;
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  color:var(--accent);
  border:1px solid #bcdcc6;
  margin-top:6px;
}

.no-results{
  padding:20px;
  background:white;
  border-radius:12px;
  text-align:center;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="container">
  
  <h2>AI Herbal Suggestions</h2>
  <p class="subtitle">Ask for herbal remedies, natural treatments, or plant recommendations.  / <a href="home.aspx"> Back to Home </a> </p>

  <!-- Query Box -->
  <div class="query-box">
    <label>Your Question for AI</label>
    <textarea id="query" placeholder="Example: herbs for immunity, plants for fever, which herb is best for diabetes?" style="width:950px"></textarea>
    <button onclick="getSuggestions()">Get AI Suggestions</button>
  </div>

  <!-- Suggestions -->
  <div id="results"></div>

</div>

<script>

/* DATABASE OF HERBS */
const herbs = [
  {
    keywords: ["immunity", "immune", "viral", "cold", "flu"],
    name: "Tulsi (Holy Basil)",
    desc: "Excellent for immunity, cold, flu and respiratory issues.",
    tag: "Immunity",
    img: "https://picsum.photos/seed/tulsi/600/400"
  },
  {
    keywords: ["fever", "temperature", "viral fever"],
    name: "Giloy",
    desc: "Reduces fever naturally and boosts immunity.",
    tag: "Fever",
    img: "https://picsum.photos/seed/giloy/600/400"
  },
  {
    keywords: ["diabetes", "sugar", "blood sugar"],
    name: "Bitter Gourd",
    desc: "Helps regulate blood sugar levels naturally.",
    tag: "Diabetes",
    img: "https://picsum.photos/seed/bitter/600/400"
  },
  {
    keywords: ["skin", "pimples", "acne", "infection"],
    name: "Neem",
    desc: "Strong antibacterial herb for skin purification.",
    tag: "Skin Care",
    img: "https://picsum.photos/seed/neem/600/400"
  },
  {
    keywords: ["digestion", "stomach", "constipation", "gut"],
    name: "Aloe Vera",
    desc: "Improves digestion and heals stomach issues.",
    tag: "Digestion",
    img: "https://picsum.photos/seed/aloe/600/400"
  },
  {
    keywords: ["stress", "anxiety", "sleep", "mental"],
    name: "Ashwagandha",
    desc: "Reduces stress, improves sleep, balances mood.",
    tag: "Stress Relief",
    img: "https://picsum.photos/seed/ashwa/600/400"
  },
  {
    keywords: ["cough", "throat", "sore throat"],
    name: "Licorice (Mulethi)",
    desc: "Soothes throat and helps cure cough.",
    tag: "Cold & Cough",
    img: "https://picsum.photos/seed/mulethi/600/400"
  }
];


/* AI LOGIC */
function getSuggestions(){
  const query = document.getElementById("query").value.toLowerCase();
  const resultDiv = document.getElementById("results");
  let matches = [];

  if(query.trim() === ""){
    resultDiv.innerHTML = `<div class="no-results">⚠️ Please enter your query.</div>`;
    return;
  }

  // MATCHING HERBS WITH KEYWORDS
  herbs.forEach(h => {
    h.keywords.forEach(k => {
      if(query.includes(k)){
        matches.push(h);
      }
    });
  });

  // Remove duplicates
  matches = [...new Set(matches)];

  if(matches.length === 0){
    resultDiv.innerHTML = `<div class="no-results">❌ No herbal suggestions found for your query.</div>`;
    return;
  }

  // Display Results
  let html = `<h2>Recommended Herbs</h2><div class="grid">`;

  matches.forEach(m => {
    html += `
      <div class="card">
        <img src="${m.img}">
        <h4>${m.name}</h4>
        <p>${m.desc}</p>
        <span class="tag">${m.tag}</span>
      </div>
    `;
  });

  html += `</div>`;
  resultDiv.innerHTML = html;
}

</script>

</body>
</html>
